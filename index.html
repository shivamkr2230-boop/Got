<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharda Library</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f5f7fa;
}/* Navbar */ .navbar{ position:fixed; top:0; width:100%; display:flex; justify-content:space-between; align-items:center; padding:10px 30px; background:rgba(0,0,0,0.7); color:#fff; z-index:1000; } .navbar img{ height:50px; } .nav-links button{ background:#ff4d4d; border:none; padding:10px 20px; color:#fff; border-radius:30px; cursor:pointer; transition:0.3s; box-shadow:0 5px 15px rgba(0,0,0,0.3); } .nav-links button:hover{ transform:translateY(-3px) scale(1.05); }

/* Hero Section */ .hero{ height:100vh; background:url('library1.jpg') no-repeat center/cover; display:flex; align-items:center; justify-content:center; text-align:center; color:#fff; } .hero h1{ font-size:50px; background:rgba(0,0,0,0.6); padding:20px; border-radius:10px; }

/* Gallery */ .gallery{ padding:50px; display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; } .gallery img{ width:100%; border-radius:15px; transition:0.4s; } .gallery img:hover{ transform:scale(1.05); }

/* Booking Section */ .booking{ padding:50px; background:#fff; } .booking h2{ text-align:center; margin-bottom:20px; } .form{ max-width:600px; margin:auto; display:flex; flex-direction:column; gap:15px; } .form input, .form select{ padding:10px; border-radius:5px; border:1px solid #ccc; } .form button{ padding:12px; background:#28a745; color:#fff; border:none; border-radius:30px; cursor:pointer; transition:0.3s; } .form button:hover{ transform:scale(1.05); }

/* Seats */ .seats{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:20px; } .seat{ padding:20px; text-align:center; background:#e0e0e0; border-radius:10px; cursor:pointer; transition:0.3s; } .seat.selected{ background:#28a745; color:#fff; }

/* Footer */ .footer{ background:#000; color:#fff; text-align:center; padding:20px; }

@media(max-width:600px){ .hero h1{font-size:30px;} .seats{grid-template-columns:repeat(2,1fr);}
} </style>

</head><body><!-- Navbar --><div class="navbar">
  <img src="logo.png" alt="logo">
  <div class="nav-links">
    <button onclick="scrollToBooking()">Book Seat</button>
  </div>
</div><!-- Hero --><div class="hero">
  <h1>Welcome to Sharda Library</h1>
</div><!-- Gallery --><div class="gallery">
  <img src="library1.jpg">
  <img src="library2.jpg">
  <img src="library3.jpg">
</div><!-- Booking --><div class="booking" id="booking">
  <h2>Seat Booking</h2>
  <div class="form">
    <input type="text" placeholder="Your Name" required>
    <input type="phone" placeholder="Phone Number" required>
    <select id="seatSelect">
      <option>Select Seat</option>
    </select>
    <button onclick="bookSeat()">Confirm Booking</button>
  </div>  <div class="seats" id="seats"></div>
</div><!-- Footer --><div class="footer">
  © 2026 Sharda Library | All Rights Reserved
</div><script>
// Create seats
const seatsContainer = document.getElementById('seats');
const seatSelect = document.getElementById('seatSelect');

for(let i=1;i<=16;i++){
  let seat = document.createElement('div');
  seat.classList.add('seat');
  seat.innerText = 'Seat '+i;
  seat.onclick = ()=>{
    document.querySelectorAll('.seat').forEach(s=>s.classList.remove('selected'));
    seat.classList.add('selected');
    seatSelect.value = 'Seat '+i;
  }
  seatsContainer.appendChild(seat);

  let option = document.createElement('option');
  option.value = 'Seat '+i;
  option.innerText = 'Seat '+i;
  seatSelect.appendChild(option);
}

function scrollToBooking(){
  document.getElementById('booking').scrollIntoView({behavior:'smooth'});
}

function bookSeat(){
  alert('Seat booked successfully! Please visit library within 24 hours to confirm.');
}
</script></body>
</html>
